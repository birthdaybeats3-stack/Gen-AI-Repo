<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BirthdayBeats</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    text-align:center;
    padding:50px;
    color:#333;
}

.container{
    background:white;
    padding:40px;
    border-radius:12px;
    max-width:600px;
    margin:auto;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h1{
    font-size:40px;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:6px;
    background:#ff4d6d;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#e63956;
}
</style>

</head>

<body>

<div class="container">
<h1>🎂 BirthdayBeats 🎵</h1>
<p>Generate AI-powered birthday music and messages.</p>

<input id="name" placeholder="Enter a name" />
<br><br>

<button onclick="generate()">Generate Message</button>

<p id="result"></p>
</div>

<script>
function generate(){
    const name = document.getElementById("name").value;
    if(!name){
        document.getElementById("result").innerText="Please enter a name.";
        return;
    }

    document.getElementById("result").innerText =
        "🎉 Happy Birthday " + name + "! May your day be filled with music and joy!";
}
</script>

</body>
</html>
